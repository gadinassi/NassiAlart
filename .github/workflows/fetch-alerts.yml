name: Fetch Oref Alerts

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch alerts via proxy
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import sys

          OREF_URL = "https://www.oref.org.il/WarningMessages/History/AlertsHistory.json"
          
          # Try multiple proxy services
          proxies = [
            f"https://api.allorigins.win/raw?url={urllib.parse.quote(OREF_URL)}",
            f"https://corsproxy.io/?{urllib.parse.quote(OREF_URL)}",
            f"https://api.codetabs.com/v1/proxy?quest={OREF_URL}",
            f"https://thingproxy.freeboard.io/fetch/{OREF_URL}",
          ]
          
          import urllib.parse

          headers = {
            "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36",
            "Accept": "application/json, */*",
          }

          data = None
          for proxy_url in proxies:
            try:
              print(f"Trying: {proxy_url[:60]}...")
              req = urllib.request.Request(proxy_url, headers=headers)
              with urllib.request.urlopen(req, timeout=10) as resp:
                raw = resp.read().decode("utf-8-sig")
                parsed = json.loads(raw)
                if isinstance(parsed, list):
                  data = parsed
                elif isinstance(parsed, dict) and "contents" in parsed:
                  data = json.loads(parsed["contents"])
                if data is not None:
                  print(f"✅ Success! Got {len(data)} alerts")
                  break
            except Exception as e:
              print(f"  Failed: {e}")
              continue

          if data is None:
            print("❌ All proxies failed", file=sys.stderr)
            sys.exit(1)

          with open("alerts.json", "w", encoding="utf-8") as f:
            json.dump(data, f, ensure_ascii=False, indent=2)
          print("Saved alerts.json")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alerts.json
          git diff --cached --quiet || git commit -m "Update alerts $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
