name: Fetch Oref Alerts

on:
  schedule:
    - cron: '*/5 * * * *'   # כל 5 דקות
  workflow_dispatch:          # הרצה ידנית

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch alerts from Oref (Python)
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import sys

          url = "https://www.oref.org.il/WarningMessages/History/AlertsHistory.json"

          headers = {
            "Host": "www.oref.org.il",
            "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
            "Accept": "application/json, text/plain, */*",
            "Accept-Language": "he-IL,he;q=0.9,en-US;q=0.8,en;q=0.7",
            "Referer": "https://www.oref.org.il/",
            "X-Requested-With": "XMLHttpRequest",
            "Connection": "keep-alive",
          }

          req = urllib.request.Request(url, headers=headers)
          try:
            with urllib.request.urlopen(req, timeout=15) as resp:
              raw = resp.read().decode("utf-8-sig")
              data = json.loads(raw)
              print(f"Got {len(data)} alerts")
              with open("alerts.json", "w", encoding="utf-8") as f:
                json.dump(data, f, ensure_ascii=False, indent=2)
          except Exception as e:
            print(f"Error: {e}", file=sys.stderr)
            sys.exit(1)
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alerts.json
          git diff --cached --quiet || git commit -m "Update alerts $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
