name: Fetch Oref Alerts

on:
  schedule:
    - cron: '*/5 * * * *'   # כל 5 דקות
  workflow_dispatch:          # הרצה ידנית

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch alerts from Oref
        run: |
          curl -s \
            -H "Referer: https://www.oref.org.il/" \
            -H "X-Requested-With: XMLHttpRequest" \
            -H "Accept: application/json" \
            "https://www.oref.org.il/WarningMessages/History/AlertsHistory.json" \
            -o alerts.json

          # Verify it's valid JSON
          python3 -c "import json,sys; json.load(open('alerts.json')); print('✅ Valid JSON,', len(json.load(open('alerts.json'))), 'alerts')"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add alerts.json
          git diff --cached --quiet || git commit -m "🚨 Update alerts $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
